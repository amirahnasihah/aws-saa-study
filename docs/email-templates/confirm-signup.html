<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your email — AWS SAA-C03 Study</title>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0e1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #0a0e1a; padding: 40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 460px; background-color: #111827; border: 1px solid #1e2d40; border-radius: 16px; overflow: hidden;">
          <!-- Header -->
          <tr>
            <td style="padding: 32px 32px 0 32px;">
              <span style="font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; color: #00d4ff; text-transform: uppercase; letter-spacing: 3px;">AWS SAA-C03 Study</span>
            </td>
          </tr>

          <!-- Title -->
          <tr>
            <td style="padding: 16px 32px 8px 32px;">
              <h1 style="margin: 0; font-size: 22px; font-weight: 600; color: #e2e8f0;">Confirm your email</h1>
            </td>
          </tr>

          <!-- Subtitle -->
          <tr>
            <td style="padding: 0 32px 24px 32px;">
              <p style="margin: 0; font-size: 14px; color: #64748b; line-height: 1.5;">Thanks for signing up! Click below to confirm your email address and start studying.</p>
            </td>
          </tr>

          <!-- OTP Code -->
          <tr>
            <td style="padding: 0 32px 24px 32px;">
              <div style="background-color: #0a0e1a; border: 1px solid #1e2d40; border-radius: 12px; padding: 20px; text-align: center;">
                <span style="font-family: 'Courier New', monospace; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 2px;">Confirmation code</span>
                <div style="margin-top: 8px; font-family: 'Courier New', monospace; font-size: 32px; font-weight: bold; color: #00d4ff; letter-spacing: 0.3em;">{{ .Token }}</div>
              </div>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding: 0 32px 24px 32px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-bottom: 1px solid #1e2d40; width: 45%;"></td>
                  <td style="text-align: center; width: 10%; font-size: 12px; color: #64748b; padding: 0 12px;">or</td>
                  <td style="border-bottom: 1px solid #1e2d40; width: 45%;"></td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Button -->
          <tr>
            <td style="padding: 0 32px 32px 32px;" align="center">
              <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 32px; background-color: #00d4ff; color: #0a0e1a; text-decoration: none; border-radius: 10px; font-size: 14px; font-weight: 600;">Confirm email address</a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 0 32px 32px 32px; border-top: 1px solid #1e2d40;">
              <p style="margin: 16px 0 0 0; font-size: 12px; color: #64748b; line-height: 1.5;">If you didn't create an account, you can safely ignore this email.</p>
              <p style="margin: 8px 0 0 0; font-size: 11px; color: #475569;">Sent to {{ .Email }}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're invited — AWS SAA-C03 Study</title>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0e1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #0a0e1a; padding: 40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 460px; background-color: #111827; border: 1px solid #1e2d40; border-radius: 16px; overflow: hidden;">
          <!-- Header -->
          <tr>
            <td style="padding: 32px 32px 0 32px;">
              <span style="font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; color: #00d4ff; text-transform: uppercase; letter-spacing: 3px;">AWS SAA-C03 Study</span>
            </td>
          </tr>

          <!-- Title -->
          <tr>
            <td style="padding: 16px 32px 8px 32px;">
              <h1 style="margin: 0; font-size: 22px; font-weight: 600; color: #e2e8f0;">You've been invited</h1>
            </td>
          </tr>

          <!-- Subtitle -->
          <tr>
            <td style="padding: 0 32px 32px 32px;">
              <p style="margin: 0; font-size: 14px; color: #64748b; line-height: 1.5;">You've been invited to join the AWS Solutions Architect study platform. Click below to accept and create your account.</p>
            </td>
          </tr>

          <!-- Button -->
          <tr>
            <td style="padding: 0 32px 32px 32px;" align="center">
              <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 32px; background-color: #00d4ff; color: #0a0e1a; text-decoration: none; border-radius: 10px; font-size: 14px; font-weight: 600;">Accept invitation</a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 0 32px 32px 32px; border-top: 1px solid #1e2d40;">
              <p style="margin: 16px 0 0 0; font-size: 12px; color: #64748b; line-height: 1.5;">If you weren't expecting this invitation, you can safely ignore this email.</p>
              <p style="margin: 8px 0 0 0; font-size: 11px; color: #475569;">Sent to {{ .Email }}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>

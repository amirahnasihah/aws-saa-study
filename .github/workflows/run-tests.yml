name: Run Tests
on:
  pull_request:
    types: [review_requested, synchronize, labeled]
  push:
    branches:
      - "main"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  run-tests:
    if: |
      (github.event_name == 'push') ||
      (github.event.action == 'review_requested') ||
      (github.event.action == 'labeled' && github.event.label.name == 'ci-testing') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'ci-testing'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set 'ci-testing' label
        if: github.event.action == 'review_requested'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["ci-testing"]
            })
      
      - name: Check for package.json
        id: check_package
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Bun
        if: steps.check_package.outputs.exists == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.check_package.outputs.exists == 'true'
        run: bun install --frozen-lockfile

      - name: Build and run tests
        if: steps.check_package.outputs.exists == 'true'
        run: |
          bun run build --if-present
          bun run test --if-present
      
      - name: Skip message
        if: steps.check_package.outputs.exists == 'false'
        run: echo "⚠ No package.json found. Skipping test steps."
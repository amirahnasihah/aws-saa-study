name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
        types: [opened, synchronize, reopened, ready_for_review]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Check for package.json
              id: check_package
              run: |
                  if [ -f package.json ]; then
                      echo "exists=true" >> $GITHUB_OUTPUT
                  else
                      echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            - name: Set up Bun
              if: steps.check_package.outputs.exists == 'true'
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              if: steps.check_package.outputs.exists == 'true'
              run: bun install --frozen-lockfile

            - name: Run linter
              if: steps.check_package.outputs.exists == 'true'
              run: bun run lint

            - name: Run tests
              if: steps.check_package.outputs.exists == 'true'
              run: |
                  if bun run --print test &>/dev/null 2>&1; then
                    bun run test
                  else
                    echo "No test script found, skipping."
                  fi

            - name: Build
              if: steps.check_package.outputs.exists == 'true'
              run: bun run build
              env:
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

            - name: Skip message
              if: steps.check_package.outputs.exists == 'false'
              run: echo "⚠ No package.json found. Skipping CI steps."

    security:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Check for package.json
              id: check_package
              run: |
                  if [ -f package.json ]; then
                      echo "exists=true" >> $GITHUB_OUTPUT
                  else
                      echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            - name: Set up Bun
              if: steps.check_package.outputs.exists == 'true'
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              if: steps.check_package.outputs.exists == 'true'
              run: bun install --frozen-lockfile

            - name: Run audit
              if: steps.check_package.outputs.exists == 'true'
              run: bun audit
              continue-on-error: true

            - name: Run Snyk security scan
              if: steps.check_package.outputs.exists == 'true'
              uses: snyk/actions/node@master
              continue-on-error: true
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

            - name: Skip message
              if: steps.check_package.outputs.exists == 'false'
              run: echo "⚠ No package.json found. Skipping security checks."
